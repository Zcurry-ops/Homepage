name: Research Radar

# Auto-updates data/papers.json with recent papers related to Hanfei's research.
# Runs weekly (and can be triggered manually from the Actions tab).

on:
  schedule:
    - cron: "0 1 * * 1"      # every Monday 01:00 UTC
  workflow_dispatch: {}       # manual "Run workflow" button

permissions:
  contents: write             # allow committing the refreshed JSON

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch & summarize recent papers
        env:
          # Optional: add ONE key as a repo secret to get AI summaries.
          # Settings -> Secrets and variables -> Actions -> New repository secret
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Optional: for third-party / proxy keys, also set these (as secrets or vars).
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
          RADAR_MODEL: ${{ vars.RADAR_MODEL }}
        run: python3 scripts/update_radar.py

      - name: Commit if changed
        run: |
          git config user.name  "research-radar-bot"
          git config user.email "actions@github.com"
          git add data/papers.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore(radar): refresh tracked papers"
            git push
          fi
