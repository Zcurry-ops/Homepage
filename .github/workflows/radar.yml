name: Research Radar

on:
  schedule:
    - cron: "0 1 * * 1"      # 每周一 01:00 UTC 自动运行
  workflow_dispatch: {}       # 允许手动点击运行

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch & summarize recent papers
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: https://poloai.top/v1
          RADAR_MODEL: gpt-4o-mini
        run: python3 scripts/update_radar.py
      - name: Commit if changed
        run: |
          git config user.name  "research-radar-bot"
          git config user.email "actions@github.com"
          git add data/papers.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore(radar): refresh tracked papers"
            git push
          fi
